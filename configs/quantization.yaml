# =============================================================================
# Denver Sprinkler LLM — Quantization Configuration
# =============================================================================
# Dual-path quantization: BitNet ternary (experimental) + GGUF (production)
# Input: merged model from training (models/merged/)
# =============================================================================

# --- Input ---
merged_model_dir: "models/merged"

# --- BitNet settings ---
bitnet:
  repo_url: "https://github.com/microsoft/BitNet.git"
  revision: "58c005d97fafab4cdce7844649e85e1e08f81842"  # v0.1 (2025-03-07)
  cache_dir: ".bitnet-cache"
  output_dir: "models/denver-sprinkler-3b-1bit"
  quant_type: "i2_s"
  # Scripts within the BitNet repo used for conversion
  preprocess_script: "utils/preprocess-huggingface-bitnet.py"
  convert_script: "utils/convert-hf-to-gguf-bitnet.py"

# --- GGUF settings ---
gguf:
  repo_url: "https://github.com/ggerganov/llama.cpp.git"
  revision: "b5e0e24de3e3dcf8e7e3b5348ef769cd07b9c774"  # b5060 (2025-04-07)
  cache_dir: ".llama-cpp-cache"
  output_dir: "models/denver-sprinkler-3b-gguf"
  convert_script: "convert_hf_to_gguf.py"
  quant_types:
    - "Q2_K"
    - "Q3_K_S"
    - "Q4_K_M"

# --- Evaluation ---
eval:
  held_out_questions_path: "models/held_out_questions.json"
  reference_eval_path: "models/eval_results.json"
  output_path: "models/quantized_eval_results.json"
  max_new_tokens: 300
  temperature: 0.7
  system_prompt: >-
    You are a helpful assistant for Denver Sprinkler and Landscape,
    a landscaping and sprinkler company in Englewood, Colorado.
    Phone: (303) 993-8717. Email: info@denversprinklerservices.com.
    Address: 3971 S Decatur St Unit A, Englewood, CO 80110.
    Hours: Mon-Fri 7am-5pm, Sat 8am-2pm, Sun Closed. Emergency service available 24/7.

# --- Quality thresholds ---
quality:
  # Minimum response length (chars) to consider non-degenerate
  min_response_length: 20
  # Maximum repetition ratio (repeated ngrams / total ngrams)
  max_repetition_ratio: 0.5
  # Business details that must appear correctly in relevant answers
  required_business_details:
    phone: "(303) 993-8717"
    email: "info@denversprinklerservices.com"
    address: "3971 S Decatur St"
  # Minimum fraction of questions that must pass coherence check
  min_coherence_pass_rate: 0.7

# --- S3 settings ---
s3:
  # Bucket name comes from S3_BUCKET_NAME environment variable
  prefix: "models/denver-sprinkler-3b-1bit"

# --- Model metadata (for model card) ---
model:
  name: "Denver Sprinkler & Landscape Chat Assistant"
  base_model: "meta-llama/Llama-3.2-3B-Instruct"
  lora_rank: 16
  lora_alpha: 32
  training_pairs: 1049
  site_pages: 58
  rag_chunks: 906
